services:
  # ── Backend: FastAPI ────────────────────────────────────────────────────
  stem-backend:
    container_name: stem-backend
    build:
      context: ./backend
      dockerfile: Dockerfile  # Asegúrate de usar el Dockerfile optimizado sin --reload
    # En producción no exponemos el puerto 8000 al mundo exterior. 
    # Todo el tráfico debe entrar obligatoriamente a través de Nginx (puerto 80).
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    environment:
      # En producción cerramos los CORS estrictamente a los dominios productivos
      CORS_ORIGINS: '["http://localhost", "https://tudominio.com"]'
      ENVIRONMENT: "production"

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    networks:
      - stem-net

  # ── Frontend: React + Nginx ──────────────────────────────────────────────
  stem-frontend:
    container_name: stem-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""  # Se queda vacío para usar rutas relativas mediante el proxy de Nginx 
    ports:
      - "80:80"
    depends_on:
      stem-backend:
        condition: service_healthy
    restart: always
    networks:
      - stem-net

networks:
  stem-net:
    driver: bridge