server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Headers de Seguridad Básicas para Producción
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Compresión gzip para JS/CSS grandes (Leaflet, Recharts)
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Proxy inverso para el backend FastAPI
    location /api/ {
        proxy_pass         http://stem-backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeout generoso para el ETL con geocodificación
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Deshabilitar o proteger las herramientas de desarrollo en producción externa
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass       http://stem-backend:8000;
        proxy_set_header Host $host;
        # Nota: Si este servidor estará abierto al público, considera comentar u ocultar 
        # este bloque para que no exponga la estructura de tu API externamente.
    }

    # Proxy para health check del backend
    location /health {
        proxy_pass       http://stem-backend:8000/health;
        proxy_set_header Host $host;
    }

    # React Router: cualquier ruta que no sea un archivo existente se sirve con index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets estáticos (Vite les pone hash en el nombre)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}